name: Validate

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # Update to v4
      
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"
        continue-on-error: true  
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements_test.txt
          pip install git+https://github.com/home-assistant/core.git  # Full installation for hassfest
        continue-on-error: true  
      - name: Create minimal config
        run: |
          mkdir -p /tmp/ha
          echo "default_config: {}" > /tmp/ha/configuration.yaml
        continue-on-error: true
      - name: Validate with Home Assistant
        run: |
          python -m homeassistant --version
          python -m homeassistant --config /tmp/ha --script check_config
        continue-on-error: true
      - name: HACS validation
        uses: hacs/action@main
        with:
          category: "integration"
        continue-on-error: true
      - name: Run hassfest
        run: |
          python -m homeassistant.scripts.hassfest validate
          python -m homeassistant.scripts.hassfest translation